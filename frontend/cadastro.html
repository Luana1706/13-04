<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cadastro-wrapper">
        <div class="container-cadastro">
            <h2 class="logo-texto">Pronto <span class="logo-destaque">Look</span></h2>
            <h3>Criar Conta</h3>
            <p>Seja bem-vinda! Preencha os campos para continuar.</p>

            <form id="formCadastro">
                <div class="input-box">
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                </div>
                <div class="input-box">
                    <input type="email" id="email" placeholder="Seu melhor e-mail" required>
                </div>
                <div class="input-box">
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>
                <button type="submit" class="btn-cadastrar">CADASTRAR</button>
            </form>

            <p id="mensagem"></p>
            
            <div class="footer-form">
                <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
