<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cadastro-wrapper">
        <div class="container-cadastro">
            <h2 class="logo-texto">Pronto <span class="logo-destaque">Look</span></h2>
            <h3>Entrar</h3>
            <p>Acesse sua conta para conferir as novidades.</p>

            <form id="formLogin">
                <div class="input-box">
                    <input type="email" id="email" placeholder="Seu e-mail" required>
                </div>
                <div class="input-box">
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-cadastrar">ENTRAR</button>
            </form>

            <p id="mensagem"></p>
            
            <div class="footer-form">
                <p>Ainda não tem conta? <a href="cadastro.html">Criar uma aqui</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
